version: '3.8'

services:
  minio:
    image: minio/minio
    container_name: minio_local
    ports:
      - "9000:9000" # Port API
      - "9001:9001" # Port Web Console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin1234
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data: